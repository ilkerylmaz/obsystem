spring.application.name=obsystem

# PostgreSQL connection infs
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}
spring.datasource.username=${DB_USER:postgres}
spring.datasource.password=${DB_PASS:12345}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

#Health Check
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

# .env eslemesi
spring.datasource.jwtsecret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
spring.datasource.expirationtime=${EXPIRATION_TIME:86400000}